<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" style="background-color: #111217; font-family: 'Inter', 'Roboto', sans-serif;">
  <!-- Grid Background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e2025" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Header -->
  <text x="40" y="40" fill="#cdd1d5" font-size="18" font-weight="600" letter-spacing="2">ERGONOMIC TOPOLOGY: SLAB VS. SPLIT</text>
  <line x1="0" y1="60" x2="1000" y2="60" stroke="#22252b" stroke-width="2" />
  <line x1="500" y1="60" x2="500" y2="500" stroke="#22252b" stroke-width="2" stroke-dasharray="8,8" />

  <!-- ========================================== -->
  <!-- LEFT SIDE: ROW-STAGGERED SLAB              -->
  <!-- ========================================== -->
  <g transform="translate(40, 120)">
    <text x="160" y="-20" fill="#e02f44" font-size="20" font-weight="bold">SLAB</text>
    <text x="160" y="0" fill="#9fa3a9" font-size="14">Row-Staggered (Wrists Bent)</text>

    <!-- Schematic Hands (parallel palms, inward-twisted forearms) -->
    <g opacity="0.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 9 350
        L 37 132
        C 29 119, 20 107, 16 92
        L 7 54
        C 5 45, 9 38, 17 36
        C 24 34, 30 39, 33 47
        L 42 71
        L 34 23
        C 32 14, 37 7, 45 6
        C 53 5, 59 10, 61 19
        L 68 61
        L 65 13
        C 65 5, 71 0, 78 1
        C 85 1, 90 6, 91 14
        L 95 61
        L 95 22
        C 95 14, 101 9, 108 10
        C 115 11, 119 16, 119 24
        L 118 82
        C 124 74, 132 69, 139 72
        C 146 75, 148 82, 145 90
        L 132 121
        C 127 135, 118 145, 107 152
        L 76 350 Z"
        fill="#e02f44" fill-opacity="0.15" stroke="#e02f44" stroke-width="2"/>
      <!-- The palm stays straight while the forearm turns inward by about 10 degrees. -->
      <line x1="76" y1="42" x2="76" y2="140" stroke="#e02f44" stroke-width="2" stroke-dasharray="4,4"/>
      <line x1="76" y1="140" x2="48" y2="350" stroke="#e02f44" stroke-width="2" stroke-dasharray="4,4"/>
      <path d="M 76 165 A 25 25 0 0 0 73 141" fill="none" stroke="#ff9830" stroke-width="2"/>
      <circle cx="76" cy="140" r="4" fill="#ff9830" stroke="none"/>
    </g>

    <g transform="translate(192, 0) translate(154, 0) scale(-1, 1)" opacity="0.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 9 350
        L 37 132
        C 29 119, 20 107, 16 92
        L 7 54
        C 5 45, 9 38, 17 36
        C 24 34, 30 39, 33 47
        L 42 71
        L 34 23
        C 32 14, 37 7, 45 6
        C 53 5, 59 10, 61 19
        L 68 61
        L 65 13
        C 65 5, 71 0, 78 1
        C 85 1, 90 6, 91 14
        L 95 61
        L 95 22
        C 95 14, 101 9, 108 10
        C 115 11, 119 16, 119 24
        L 118 82
        C 124 74, 132 69, 139 72
        C 146 75, 148 82, 145 90
        L 132 121
        C 127 135, 118 145, 107 152
        L 76 350 Z"
        fill="#e02f44" fill-opacity="0.15" stroke="#e02f44" stroke-width="2"/>
      <line x1="76" y1="42" x2="76" y2="140" stroke="#e02f44" stroke-width="2" stroke-dasharray="4,4"/>
      <line x1="76" y1="140" x2="48" y2="350" stroke="#e02f44" stroke-width="2" stroke-dasharray="4,4"/>
      <path d="M 76 165 A 25 25 0 0 0 73 141" fill="none" stroke="#ff9830" stroke-width="2"/>
      <circle cx="76" cy="140" r="4" fill="#ff9830" stroke="none"/>
    </g>

    <!-- Schematic Key Outlines (Left Hand Typing Zone) -->
    <!-- Size: 28x28, Gap: 4 -->
    <g fill="none" stroke="#474e5d" stroke-width="1.5" rx="3">
      <!-- Top Row -->
      <rect x="0" y="40" width="28" height="28"/><rect x="32" y="40" width="28" height="28"/>
      <rect x="64" y="40" width="28" height="28"/><rect x="96" y="40" width="28" height="28"/>
      <rect x="128" y="40" width="28" height="28"/>

      <!-- Home Row (Staggered right by 8px) -->
      <rect x="8" y="72" width="28" height="28"/><rect x="40" y="72" width="28" height="28"/>
      <rect x="72" y="72" width="28" height="28"/><rect x="104" y="72" width="28" height="28"/>
      <rect x="136" y="72" width="28" height="28"/>

      <!-- Bottom Row (Staggered right by 16px) -->
      <rect x="16" y="104" width="28" height="28"/><rect x="48" y="104" width="28" height="28"/>
      <rect x="80" y="104" width="28" height="28"/><rect x="112" y="104" width="28" height="28"/>
      <rect x="144" y="104" width="28" height="28"/>
    </g>

    <!-- Schematic Key Outlines (Right Hand Typing Zone) -->
    <g fill="none" stroke="#474e5d" stroke-width="1.5" rx="3" transform="translate(192, 0)">
      <!-- Top Row -->
      <rect x="0" y="40" width="28" height="28"/><rect x="32" y="40" width="28" height="28"/>
      <rect x="64" y="40" width="28" height="28"/><rect x="96" y="40" width="28" height="28"/>
      <rect x="128" y="40" width="28" height="28"/>

      <!-- Home Row -->
      <rect x="8" y="72" width="28" height="28"/><rect x="40" y="72" width="28" height="28"/>
      <rect x="72" y="72" width="28" height="28"/><rect x="104" y="72" width="28" height="28"/>
      <rect x="136" y="72" width="28" height="28"/>

      <!-- Bottom Row -->
      <rect x="16" y="104" width="28" height="28"/><rect x="48" y="104" width="28" height="28"/>
      <rect x="80" y="104" width="28" height="28"/><rect x="112" y="104" width="28" height="28"/>
      <rect x="144" y="104" width="28" height="28"/>
    </g>

    <text x="120" y="320" fill="#e02f44" font-size="12" font-weight="bold">ULNAR DEVIATION</text>
    <text x="100" y="340" fill="#9fa3a9" font-size="11">Wrist must break axis to align</text>
    <text x="100" y="355" fill="#9fa3a9" font-size="11">with flat horizontal rows.</text>
  </g>


  <!-- ========================================== -->
  <!-- RIGHT SIDE: COLUMN-STAGGERED SPLIT         -->
  <!-- ========================================== -->
  <g transform="translate(540, 120)">
    <text x="180" y="-25" fill="#73bf69" font-size="20" font-weight="bold">SPLIT</text>
    <text x="20" y="-5" fill="#9fa3a9" font-size="12">Column-Staggered (Neutral Wrists)</text>

    <!-- Schematic Hand (Left - Neutral) -->
    <g transform="translate(20, 50) rotate(15)" opacity="0.8" stroke-linecap="round" stroke-linejoin="round">
      <!-- A simplified open hand: fingers are separated instead of being a single mitten-like arc. -->
      <path d="M 37 300
        L 37 132
        C 29 119, 20 107, 16 92
        L 7 54
        C 5 45, 9 38, 17 36
        C 24 34, 30 39, 33 47
        L 42 71
        L 34 23
        C 32 14, 37 7, 45 6
        C 53 5, 59 10, 61 19
        L 68 61
        L 65 13
        C 65 5, 71 0, 78 1
        C 85 1, 90 6, 91 14
        L 95 61
        L 95 22
        C 95 14, 101 9, 108 10
        C 115 11, 119 16, 119 24
        L 118 82
        C 124 74, 132 69, 139 72
        C 146 75, 148 82, 145 90
        L 132 121
        C 127 135, 118 145, 107 152
        L 104 300 Z"
        fill="#73bf69" fill-opacity="0.15" stroke="#73bf69" stroke-width="2"/>
      <!-- Straight inward-facing axis through the palm and forearm. -->
      <line x1="76" y1="42" x2="76" y2="300" stroke="#73bf69" stroke-width="2" stroke-dasharray="4,4"/>
      <circle cx="76" cy="140" r="4" fill="#73bf69" stroke="none"/>
    </g>

    <!-- Schematic Key Outlines (Left Half - Rotated 15 deg) -->
    <g transform="translate(20, 50) rotate(15)">
      <g fill="none" stroke="#73bf69" stroke-width="1.5" rx="3">
        <!-- Pinky Col -->
        <rect x="0" y="24" width="28" height="28"/><rect x="0" y="56" width="28" height="28"/><rect x="0" y="88" width="28" height="28"/>
        <!-- Ring Col -->
        <rect x="32" y="8" width="28" height="28"/><rect x="32" y="40" width="28" height="28"/><rect x="32" y="72" width="28" height="28"/>
        <!-- Middle Col -->
        <rect x="64" y="-8" width="28" height="28"/><rect x="64" y="24" width="28" height="28"/><rect x="64" y="56" width="28" height="28"/>
        <!-- Index Col 1 -->
        <rect x="96" y="8" width="28" height="28"/><rect x="96" y="40" width="28" height="28"/><rect x="96" y="72" width="28" height="28"/>
        <!-- Index Col 2 -->
        <rect x="128" y="16" width="28" height="28"/><rect x="128" y="48" width="28" height="28"/><rect x="128" y="80" width="28" height="28"/>
        <!-- Thumb keys -->
        <rect x="64" y="104" width="28" height="28"/><rect x="96" y="112" width="28" height="28"/><rect x="128" y="120" width="28" height="28"/>
      </g>

    </g>

    <!-- Schematic Hand (Right - Neutral, mirrored from the left hand) -->
    <g transform="translate(240, 80) rotate(-15) translate(172, 0) scale(-1, 1)" opacity="0.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 37 300
        L 37 132
        C 29 119, 20 107, 16 92
        L 7 54
        C 5 45, 9 38, 17 36
        C 24 34, 30 39, 33 47
        L 42 71
        L 34 23
        C 32 14, 37 7, 45 6
        C 53 5, 59 10, 61 19
        L 68 61
        L 65 13
        C 65 5, 71 0, 78 1
        C 85 1, 90 6, 91 14
        L 95 61
        L 95 22
        C 95 14, 101 9, 108 10
        C 115 11, 119 16, 119 24
        L 118 82
        C 124 74, 132 69, 139 72
        C 146 75, 148 82, 145 90
        L 132 121
        C 127 135, 118 145, 107 152
        L 104 300 Z"
        fill="#73bf69" fill-opacity="0.15" stroke="#73bf69" stroke-width="2"/>
      <line x1="76" y1="42" x2="76" y2="300" stroke="#73bf69" stroke-width="2" stroke-dasharray="4,4"/>
      <circle cx="76" cy="140" r="4" fill="#73bf69" stroke="none"/>
    </g>

    <!-- Schematic Key Outlines (Right Half - Rotated -15 deg) -->
    <g transform="translate(240, 80) rotate(-15)">
      <g fill="none" stroke="#73bf69" stroke-width="1.5" rx="3">
        <!-- Index Col 2 -->
        <rect x="0" y="16" width="28" height="28"/><rect x="0" y="48" width="28" height="28"/><rect x="0" y="80" width="28" height="28"/>
        <!-- Index Col 1 -->
        <rect x="32" y="8" width="28" height="28"/><rect x="32" y="40" width="28" height="28"/><rect x="32" y="72" width="28" height="28"/>
        <!-- Middle Col -->
        <rect x="64" y="-8" width="28" height="28"/><rect x="64" y="24" width="28" height="28"/><rect x="64" y="56" width="28" height="28"/>
        <!-- Ring Col -->
        <rect x="96" y="8" width="28" height="28"/><rect x="96" y="40" width="28" height="28"/><rect x="96" y="72" width="28" height="28"/>
        <!-- Pinky Col -->
        <rect x="128" y="24" width="28" height="28"/><rect x="128" y="56" width="28" height="28"/><rect x="128" y="88" width="28" height="28"/>
        <!-- Thumb keys -->
        <rect x="0" y="120" width="28" height="28"/><rect x="32" y="112" width="28" height="28"/><rect x="64" y="104" width="28" height="28"/>
      </g>

    </g>

    <text x="140" y="320" fill="#73bf69" font-size="12" font-weight="bold">NEUTRAL GEOMETRY</text>
    <text x="140" y="340" fill="#9fa3a9" font-size="12">Columns map to finger arcs.</text>
    <text x="140" y="355" fill="#9fa3a9" font-size="12">Angle maps to shoulder width.</text>
  </g>

  <!-- ========================================== -->
  <!-- TENTING DETAIL DIAGRAM (Top Right Corner)  -->
  <!-- ========================================== -->
  <g transform="translate(780, 65)">
    <rect x="0" y="0" width="190" height="90" rx="4" fill="#181a1f" stroke="#333842" stroke-width="1"/>
    <text x="95" y="20" fill="#cdd1d5" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">VERTICAL TENTING</text>
    <text x="95" y="35" fill="#7b8087" font-size="10" text-anchor="middle">Pronation relief (Right Hand)</text>

    <!-- Schematic Side-profile -->
    <g transform="translate(10, 68)">
      <!-- Desk line -->
      <line x1="-10" y1="0" x2="160" y2="0" stroke="#474e5d" stroke-width="1.5" stroke-dasharray="3,2"/>

      <!-- Keycap profile block -->
      <polygon points="0,0 140,-14 140,-20 0,-6" fill="none" stroke="#73bf69" stroke-width="1.5"/>
      <rect x="10" y="-12" width="12" height="4" fill="#73bf69" transform="rotate(-5.7, 10, -12)"/>
      <rect x="35" y="-12" width="12" height="4" fill="#73bf69" transform="rotate(-5.7, 35, -12)"/>
      <rect x="60" y="-12" width="12" height="4" fill="#73bf69" transform="rotate(-5.7, 60, -12)"/>
      <rect x="85" y="-12" width="12" height="4" fill="#73bf69" transform="rotate(-5.7, 85, -12)"/>

      <!-- Angle line & Text -->
      <path d="M 35 0 A 35 35 0 0 0 34 -4" fill="none" stroke="#e02f44" stroke-width="1.5"/>
      <text x="45" y="-3" fill="#e02f44" font-size="10">10% (~5.7°)</text>
    </g>
  </g>

</svg>
