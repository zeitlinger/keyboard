# Special-case blog diagram: what the next press produces right after you type `n`.
# Hand-authored (not generated) — combines adaptive-key rewrites and magic-key expansions.
draw_config:
  dark_mode: false
  footer_text: '✦1 understand   ✦2 never   ✦3 anything   ✦4 explain   ✦5 won''t'
layout:
  qmk_keyboard: ferris/sweep
layers:
  "After you type  n":
    - "esc"          # 0
    - {t: "nl", h: "x", type: held}   # 1  adaptive: x -> nl
    - "w"            # 2
    - ""             # 3
    - ""             # 4
    - ""             # 5
    - ""             # 6
    - ""             # 7  magic_a (upper trigger of ✦2)
    - ""             # 8  magic_b (upper trigger of ✦3)
    - ""             # 9
    - "s"            # 10
    - "c"            # 11
    - "n"            # 12
    - "t"            # 13
    - ""             # 14
    - ""             # 15
    - "a"            # 16
    - "e"            # 17
    - "i"            # 18
    - {t: "nn", h: "h", type: held}   # 19  adaptive: h -> nn (also lower trigger of ✦4)
    - ""             # 20  *Right
    - "f"            # 21
    - "l"            # 22
    - "d"            # 23
    - ""             # 24
    - ""             # 25
    - "u"            # 26
    - "o"            # 27
    - "y"            # 28
    - ""             # 29  *Left
    - ""             # 30  *Nav
    - {t: "ng", h: "r", type: held}   # 31  adaptive: r -> ng
    - "spc"          # 32
    - ""             # 33  *FnSym
combos:
  - {p: [16, 26], k: "✦1", layers: ["After you type  n"]}   # magic_h understand
  - {p: [7, 17], k: "✦2", layers: ["After you type  n"]}   # magic_d never
  - {p: [8, 18], k: "✦3", layers: ["After you type  n"]}   # magic_e anything
  - {p: [9, 19], k: "✦4", layers: ["After you type  n"]}   # magic_f explain
  - {p: [17, 27], k: "✦5", layers: ["After you type  n"]}   # magic_i won't
