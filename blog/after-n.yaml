# Blog diagram (full): everything the next press can do right after you type `n`.
# Pink keys = adaptive rewrites on ordinary keys; ✦ badges = magic keys (combos + the two real
# magic keys). The single-letter magics (✦r ✦h ✦x ✦p) are the compensation: the adaptives consume
# r/h/x/p after n, and magic hands those letters back so every letter is still reachable.
draw_config:
  footer_text: '✦1 understand   ✦2 never   ✦3 anything   ✦4 explain   ✦5 won''t'
layout:
  qmk_keyboard: ferris/sweep
layers:
  "After you type  n":
    - "esc"          # 0
    - {t: "l", type: held}   # 1  adaptive: x -> l  (nl)
    - "w"            # 2
    - ""             # 3
    - ""             # 4
    - ""             # 5
    - ""             # 6
    - "✦r"           # 7  magic_a tap -> r
    - "✦h"           # 8  magic_b tap -> h
    - ""             # 9
    - "s"            # 10
    - "c"            # 11
    - "n"            # 12
    - "t"            # 13
    - ""             # 14
    - ""             # 15
    - "a"            # 16
    - "e"            # 17
    - "i"            # 18
    - {t: "n", type: held}   # 19  adaptive: h -> n  (nn)
    - ""             # 20
    - "f"            # 21
    - "l"            # 22
    - "d"            # 23
    - ""             # 24
    - ""             # 25
    - "u"            # 26
    - "o"            # 27
    - "y"            # 28
    - ""             # 29
    - ""             # 30
    - {t: "g", type: held}   # 31  adaptive: r -> g  (ng)
    - "spc"          # 32
    - ""             # 33
combos:
  - {p: [16, 26], k: "✦1", layers: ["After you type  n"]}   # understand
  - {p: [7, 17], k: "✦2", layers: ["After you type  n"]}   # never
  - {p: [8, 18], k: "✦3", layers: ["After you type  n"]}   # anything
  - {p: [9, 19], k: "✦4", layers: ["After you type  n"]}   # explain
  - {p: [17, 27], k: "✦5", layers: ["After you type  n"]}   # won't
  - {p: [18, 28], k: "✦x", layers: ["After you type  n"]}   # magic_j -> x
  - {p: [19, 29], k: "✦p", layers: ["After you type  n"]}   # magic_k -> p
  - {p: [1, 11], k: "k", type: "held", layers: ["After you type  n"]}   # adaptive: p-combo -> k (nk)
