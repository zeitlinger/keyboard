# Blog diagram (stripped): magic keys that finish a whole word after `n`.
draw_config:
  footer_text: '✦1 understand   ✦2 never   ✦3 anything   ✦4 explain   ✦5 won''t'
layout:
  qmk_keyboard: ferris/sweep
layers:
  "After n: magic finishes the word":
