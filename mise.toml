[tools]
"aqua:linebender/resvg" = "0.47.0"
java = "26"
jq = "latest"
maven = "latest"
"pipx:keymap-drawer" = "0.23.0"
python = "3"
uv = "latest"

# Linters
actionlint = "1.7.12"
"aqua:grafana/flint" = "0.22.5"
"aqua:jonwiggins/xmloxide" = "0.4.3"
"aqua:owenlamont/ryl" = "0.16.0"
editorconfig-checker = "3.7.0"
ktlint = "1.8.0"
lychee = "0.24.2"
ruff = "0.15.17"
rumdl = "0.2.14"
taplo = "0.10.0"

[tasks.compile]
description = "Compile Kotlin"
run = "mvn compile exec:java"

[tasks.gen-keymap]
description = "Generate Keymap svg"
depends = ["compile"]
sources = ["keymap_drawer.config.yaml", "qmk/keymap.yaml"]
outputs = ["keymap.svg"]
run = 'keymap -c "$KEYMAP_CONFIG" draw qmk/keymap.yaml > keymap.svg'

[tasks.gen-base-layer]
description = "Generate base-layer svg for the blog (Base layer only)"
depends = ["compile"]
sources = ["keymap_drawer.config.yaml", "qmk/keymap.yaml"]
outputs = ["blog/base-layer.svg"]
run = 'keymap -c "$KEYMAP_CONFIG" draw -s Base -- qmk/keymap.yaml > blog/base-layer.svg'

[tasks.gen-magic-words]
description = "Generate Keymap svg"
depends = ["compile"]
sources = ["keymap_drawer.config.yaml", "blog/magic-words.yaml"]
outputs = ["blog/magic-words.svg"]
run = 'keymap -c "$KEYMAP_CONFIG" draw blog/magic-words.yaml > blog/magic-words.svg'

[tasks.gen-after-n]
description = "Generate Keymap svg"
depends = ["compile"]
sources = ["keymap_drawer.config.yaml", "blog/after-n.yaml"]
outputs = ["blog/after-n.svg"]
run = 'keymap -c "$KEYMAP_CONFIG" draw blog/after-n.yaml > blog/after-n.svg'

# Render every blog SVG to a 2x PNG for Medium. codec.svg, bad-motions.svg, and
# slab-vs-split.svg are hand-authored sources; the rest come from gen-* tasks.
# keyboard.jpg is a photo (static, not generated).
[tasks.gen-blog-images]
description = "Render blog SVGs to PNG (2x) for Medium"
depends = ["gen-keymap", "gen-base-layer", "gen-magic-words", "gen-after-n"]
sources = [
  "keymap.svg",
  "blog/base-layer.svg",
  "blog/magic-words.svg",
  "blog/after-n.svg",
  "blog/codec.svg",
  "blog/bad-motions.svg",
  "blog/slab-vs-split.svg",
]
outputs = [
  "blog/images/layers.png",
  "blog/images/base-layer.png",
  "blog/images/magic-words.png",
  "blog/images/after-n.png",
  "blog/images/codec.png",
  "blog/images/bad-motions.png",
  "blog/images/slab-vs-split.png",
]
run = [
  "resvg --zoom 2 keymap.svg blog/images/layers.png",
  "resvg --zoom 2 blog/base-layer.svg blog/images/base-layer.png",
  "resvg --zoom 2 blog/magic-words.svg blog/images/magic-words.png",
  "resvg --zoom 2 blog/after-n.svg blog/images/after-n.png",
  "resvg --zoom 2 blog/codec.svg blog/images/codec.png",
  "resvg --zoom 2 --sans-serif-family 'DejaVu Sans' blog/slab-vs-split.svg blog/images/slab-vs-split.png",
  # The SVG uses a web font with no local resvg fallback; map sans-serif so
  # text is retained in the generated PNG.
  "resvg --zoom 2 --sans-serif-family 'DejaVu Sans' blog/bad-motions.svg blog/images/bad-motions.png",
]

[tasks.generate]
description = "Generate the keyboard files"
depends = ["compile", "gen-keymap", "gen-base-layer", "gen-magic-words", "gen-after-n", "gen-blog-images"]

[tasks.suggest-combos]
description = "Suggest magic-key expansions to add, ranked by typing benefit"
run = "uv run .mise/tasks/suggest-combos.py"

[tasks.flash]
description = "Flash the keyboard"
depends = "generate"
run = [
  "scripts/check-clean.sh",
  "uv run qmk flash -kb ferris/sweep -km zeitlinger -bl avrdude-split-left",
  "printf '%s %s\\n' \"$(date -Iseconds)\" \"$(git rev-parse HEAD)\" >> flash.log",
]

[tasks.lint]
description = "Run all lints"
run = "flint run"

[tasks."lint:fix"]
description = "Auto-fix lint issues"
run = "flint run --fix"

[env]
FLINT_CONFIG_DIR = ".github/config"
# Shared keymap-drawer styling for every `keymap draw` task above.
KEYMAP_CONFIG = "keymap_drawer.config.yaml"
