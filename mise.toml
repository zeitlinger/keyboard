[tools]
java = "21"
jq = "latest"
maven = "latest"
node = "24.15.0"
python = "3"
uv = "latest"

# Linters
actionlint = "1.7.12"
"aqua:grafana/flint" = "0.22.2"
"aqua:jonwiggins/xmloxide" = "0.4.3"
"aqua:owenlamont/ryl" = "0.9.1"
editorconfig-checker = "3.6.1"
ktlint = "1.8.0"
lychee = "0.24.2"
ruff = "0.15.12"
rumdl = "0.1.91"
taplo = "0.10.0"

[tasks.generate]
description = "Generate the keyboard files"
run = "mvn compile exec:java"


[tasks.suggest-combos]
description = "Suggest magic-key expansions to add, ranked by typing benefit"
run = "uv run .mise/tasks/suggest-combos.py"

[tasks.flash]
description = "Flash the keyboard"
depends = "generate"
run = [
  "uv run qmk flash -kb ferris/sweep -km zeitlinger -bl avrdude-split-left",
  "printf '%s %s\\n' \"$(date -Iseconds)\" \"$(git rev-parse HEAD)\" >> flash.log",
]

[tasks.lint]
description = "Run all lints"
run = "flint run"

[tasks."lint:fix"]
description = "Auto-fix lint issues"
run = "flint run --fix"

[env]
FLINT_CONFIG_DIR = ".github/config"
